name: Build Pocket DM APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.2
      
    - name: Build Debug APK
      run: chmod +x gradlew && ./gradlew assembleDebug

    - name: Rename APK
      run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/PocketDM-v3.1.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: PocketDM-APK
        path: app/build/outputs/apk/debug/PocketDM-v3.1.apk
